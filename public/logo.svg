<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logoTitle">
  <title id="logoTitle">EverSmile Dental Care</title>
  <defs>
    <linearGradient id="toothGradient" x1="12" y1="8" x2="28" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5EEAD4"/>
      <stop offset="55%" stop-color="#14B8A6"/>
      <stop offset="100%" stop-color="#0F9488"/>
    </linearGradient>
  </defs>

  <!-- Glass badge backdrop, matching the eyebrow-pill / card language used across the site -->
  <rect x="1" y="1" width="38" height="38" rx="11" fill="#14B8A6" fill-opacity="0.10" stroke="#14B8A6" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Tooth + smile mark: a symmetric crown tapering to two rounded roots,
       reading equally as an abstract smile curve at a glance -->
  <path
    d="M20,9
       C15.2,9 12,12.4 12,16.8
       C12,19.2 12.6,21.1 13,23.5
       C13.4,25.9 14,29.2 16.1,29.2
       C17.5,29.2 17.8,27 18,25.3
       C18.2,23.7 18.8,22.3 20,22.3
       C21.2,22.3 21.8,23.7 22,25.3
       C22.2,27 22.5,29.2 23.9,29.2
       C26,29.2 26.6,25.9 27,23.5
       C27.4,21.1 28,19.2 28,16.8
       C28,12.4 24.8,9 20,9 Z"
    fill="url(#toothGradient)"
  />

  <!-- Soft highlight for dimensionality -->
  <ellipse cx="16.6" cy="14.5" rx="1.9" ry="3" fill="#F0FDFA" fill-opacity="0.4" transform="rotate(-18 16.6 14.5)"/>
</svg>
